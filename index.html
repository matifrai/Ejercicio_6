<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de prestamo</title>
</head>
<body>
   <h1> Agencia Paquete de Verano a Bariloche </h1> 

        <p>Nombre:</p>
        <input type="text" id="NombreViajero"><br>
        <p id="fb-nombre"></p>
        <p>Edad</p>
        <input type="number" id="Edad">
        <p id="fb-dias"></p>

        <p>Presupuesto</p>
        <input type="number" id="Presupuesto"/>
        <p id="fd-presupuesto"></p>
        <p>Destino Preferido</p>
        <select id="Destino">
            <option value="">Selecciona un destino...</option>
            <option value="Bariloche"></option>
            <option value="Mendoza">Mendoza</option>
            <option value="Cataratas">Cataratas</option>
        </select><br>
        <p id="fb-destino"></p>

        <p>Temporada:</p>
        <select id="Temporada">
        <option value="">Seleccioná un estado...</option>
        <option value="Enero">Enero</option>
        <option value="Febrero">Febrero</option>
        <option value="Ambos ">Suspendido — sanción vigente</option>
        </select><br>
        <p id="fb-destino"></p>

        <p>Seguro de Viaje:</p>
        <input type="checkbox" id="Acepto">Acepto
        <p id = "fb-seguro"></p>
        
        <p>Ver Disponibilidad:</p>
        <button onclick="limpiarFormulario()"></button>
        <button onclick="registrarViaje()">
            Enviar
        </button>
